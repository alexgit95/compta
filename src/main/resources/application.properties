spring.application.name=budget-app

# Active profile: local (sqlite) or prod (postgresql)
spring.profiles.active=local

# JPA common
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Security - admin credentials from environment variables
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin}

# Session - remember-me 12 months (seconds)
app.remember-me.validity-seconds=31536000
app.remember-me.key=${REMEMBER_ME_KEY:budget-remember-me-secret-key}

# WebAuthn / Passkeys
# rpId doit correspondre au nom de domaine (sans port) du serveur
# allowedOrigins doit inclure l'origine exacte (scheme + host + port)
app.webauthn.rp-name=${WEBAUTHN_RP_NAME:Budget App}
app.webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.allowed-origins=${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:8080}
