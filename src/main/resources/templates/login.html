<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Connexion – Budget App</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-title">💰 Budget App</div>
        <div class="login-subtitle">Connectez-vous pour continuer</div>

        <div th:if="${param.error}" class="alert alert-error">
            Identifiants incorrects. Veuillez réessayer.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Vous avez été déconnecté.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input id="username" name="username" type="text" class="form-control"
                       placeholder="Votre identifiant" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" class="form-control"
                       placeholder="••••••••" required/>
            </div>
            <div class="form-group flex" style="align-items:center; gap:.5rem;">
                <input id="remember-me" name="remember-me" type="checkbox" style="width:16px;height:16px;"/>
                <label for="remember-me" style="margin:0; font-weight:400;">Se souvenir de moi (12 mois)</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                Se connecter
            </button>
        </form>

        <div style="display:flex; align-items:center; gap:.75rem; margin:1rem 0;">
            <hr style="flex:1; border:none; border-top:1px solid var(--muted)"/>
            <span style="color:var(--muted); font-size:.85rem;">ou</span>
            <hr style="flex:1; border:none; border-top:1px solid var(--muted)"/>
        </div>

        <button id="signin-passkey" type="button" class="btn btn-secondary"
                style="width:100%; justify-content:center; gap:.5rem;"
                onclick="this.disabled=true; this.textContent='⏳ En cours…'">
            🔑 Se connecter avec une clé d'accès (Passkey)
        </button>
        <div id="passkey-error" class="alert alert-error" style="display:none; margin-top:.75rem;">
            Échec de l'authentification par clé d'accès.
        </div>

        <div class="login-footer">Budget App v0.1.0</div>
    </div>
</div>
<script th:src="@{/js/spring-security-webauthn.js}"></script>
<script th:inline="javascript">
    (function () {
        const csrf = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        const headers = {};
        headers[csrfHeader] = csrf;
        const contextPath = /*[[${contextPath}]]*/ '';
        const btn = document.getElementById('signin-passkey');

        if (!window.setupLogin) {
            btn.disabled = true;
            btn.title = 'WebAuthn non supporté dans ce navigateur';
            return;
        }
        window.setupLogin(headers, contextPath, btn);
        // Restore button text on any click failure
        btn.addEventListener('click', function () {
            setTimeout(function () {
                if (btn.disabled) {
                    btn.disabled = false;
                    btn.textContent = '🔑 Se connecter avec une clé d\'accès (Passkey)';
                }
            }, 8000);
        });
    })();
</script>
</body>
</html>
