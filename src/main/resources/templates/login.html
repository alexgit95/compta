<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Connexion – Budget App</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-title">💰 Budget App</div>
        <div class="login-subtitle">Connectez-vous pour continuer</div>

        <div th:if="${param.error}" class="alert alert-error">
            Identifiants incorrects. Veuillez réessayer.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Vous avez été déconnecté.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input id="username" name="username" type="text" class="form-control"
                       placeholder="Votre identifiant" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" class="form-control"
                       placeholder="••••••••" required/>
            </div>
            <div class="form-group flex" style="align-items:center; gap:.5rem;">
                <input id="remember-me" name="remember-me" type="checkbox" style="width:16px;height:16px;"/>
                <label for="remember-me" style="margin:0; font-weight:400;">Se souvenir de moi (12 mois)</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                Se connecter
            </button>
        </form>

        <div class="login-footer">Budget App v0.1.0</div>
    </div>
</div>
</body>
</html>
