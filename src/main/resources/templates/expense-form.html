<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts})}">
<head><title>Dépense récurrente</title></head>

<th:block th:fragment="content">
<div style="max-width:560px; margin:0 auto;">
    <h1 style="font-size:1.3rem; font-weight:800; margin-bottom:1.5rem;"
        th:text="${expense.id != null} ? 'Modifier la dépense' : 'Nouvelle dépense récurrente'"></h1>

    <div class="card">
        <form th:action="@{/budget/expenses/save}" th:object="${expense}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Libellé *</label>
                <input type="text" th:field="*{label}" class="form-control" required placeholder="ex. Loyer"/>
                <div th:if="${#fields.hasErrors('label')}" class="text-muted" style="color:var(--danger);"
                     th:errors="*{label}"></div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Montant (€) *</label>
                    <input type="number" step="0.01" min="0.01" th:field="*{amount}" class="form-control" required/>
                    <div th:if="${#fields.hasErrors('amount')}" class="text-muted" style="color:var(--danger);"
                         th:errors="*{amount}"></div>
                </div>
                <div class="form-group">
                    <label>Jour du mois (1-31) *</label>
                    <input type="number" min="1" max="31" th:field="*{dayOfMonth}" class="form-control" required/>
                    <div th:if="${#fields.hasErrors('dayOfMonth')}" class="text-muted" style="color:var(--danger);"
                         th:errors="*{dayOfMonth}"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Catégorie</label>
                <select th:field="*{category}" class="form-control">
                    <option value="">-- Aucune --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.icon + ' ' + cat.name}"
                            th:selected="${expense.category != null and expense.category.id == cat.id}">
                    </option>
                </select>
            </div>

            <div class="flex" style="justify-content:flex-end; gap:.75rem; margin-top:1.5rem;">
                <a th:href="@{/budget}" class="btn btn-outline">Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <span th:text="${expense.id != null} ? 'Enregistrer' : 'Créer'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
</th:block>

<th:block th:fragment="scripts"></th:block>
</html>
