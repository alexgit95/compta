<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="layout (content, scripts)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Budget App</title>
    <meta name="theme-color" content="#276749"/>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon-192.svg">
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="navbar-brand">💰 Budget App</div>
    <div class="navbar-links">
        <a th:href="@{/budget}" th:classappend="${activePage == 'budget'} ? 'active'">📊 Budget</a>
        <a th:href="@{/savings}" th:classappend="${activePage == 'savings'} ? 'active'">🏦 Épargne</a>
        <a th:href="@{/goals}" th:classappend="${activePage == 'goals'} ? 'active'">🎯 Objectifs</a>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/categories}"
           th:classappend="${activePage == 'admin'} ? 'active'">⚙️ Administration</a>
        <a th:href="@{/webauthn/register}"
           th:classappend="${activePage == 'passkeys'} ? 'active'"
           title="Gérer mes clés d'accès (Passkeys)">🔑 Mes clés</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-link">🚪 <span sec:authentication="name"></span></button>
        </form>
    </div>
</nav>
<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <th:block th:replace="${content}"/>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<th:block th:replace="${scripts}"/>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
