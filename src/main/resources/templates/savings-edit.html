<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts})}">
<head><title>Modifier le compte épargne</title></head>

<th:block th:fragment="content">
<div style="max-width:640px; margin:0 auto;">
    <div class="flex" style="align-items:center; gap:1rem; margin-bottom:1.5rem;">
        <a th:href="@{/savings}" class="btn btn-outline btn-sm">← Retour</a>
        <h1 style="font-size:1.3rem; font-weight:800;"
            th:text="|Modifier : ${account.label}|"></h1>
    </div>

    <!-- Edit account settings -->
    <div class="card">
        <div class="card-title">Paramètres du compte</div>
        <form th:action="@{/savings/accounts/save}" th:object="${account}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}"/>
            <div class="grid-2">
                <div class="form-group">
                    <label>Libellé *</label>
                    <input type="text" th:field="*{label}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label>Versement mensuel (€) *</label>
                    <input type="number" step="0.01" min="0" th:field="*{monthlyDeposit}" class="form-control" required/>
                </div>
            </div>
            <div class="flex" style="justify-content:flex-end;">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>

    <!-- Historical entries -->
    <div class="card">
        <div class="card-title">Historique des valeurs saisies</div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Date</th>
                    <th class="text-right">Solde enregistré (€)</th>
                    <th sec:authorize="hasAnyRole('ADMIN','EDITOR')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(entries)}">
                    <td colspan="3" style="text-align:center;" class="text-muted">
                        Aucune valeur historique enregistrée.
                    </td>
                </tr>
                <tr th:each="entry : ${entries}">
                    <td th:text="${#temporals.format(entry.entryDate, 'dd/MM/yyyy')}"></td>
                    <td class="text-right" style="font-weight:600; color:var(--success);"
                        th:text="${#numbers.formatDecimal(entry.balance, 1, 2) + ' €'}"></td>
                    <td sec:authorize="hasAnyRole('ADMIN','EDITOR')">
                        <form th:action="@{/savings/entries/{eid}/delete(eid=${entry.id})}" method="post"
                              style="display:inline"
                              onsubmit="return confirm('Supprimer cette valeur ?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="accountId" th:value="${account.id}"/>
                            <button class="btn btn-danger btn-sm">🗑️</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="text-muted mt-2" style="font-size:.82rem;">
            Pour ajouter une nouvelle valeur de référence, utilisez le formulaire "Actualiser le solde" sur la page épargne.
        </div>
    </div>
</div>
</th:block>

<th:block th:fragment="scripts"></th:block>
</html>
