<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::content}, ~{::scripts})}">
<head><title>Budget</title></head>

<th:block th:fragment="content">
<div>
    <!-- Header row -->
    <div class="flex flex-wrap" style="justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem;">
        <div>
            <h1 style="font-size:1.4rem; font-weight:800;">📊 Budget du mois</h1>
            <div class="text-muted" th:text="|Projection jusqu'au ${endOfMonth}|"></div>
        </div>

        <!-- Balance input form -->
        <form th:action="@{/budget}" method="get" class="form-inline" sec:authorize="hasAnyRole('ADMIN','EDITOR')">
            <div class="form-group">
                <label>Solde actuel (€)</label>
                <input type="number" step="0.01" name="balance" class="form-control"
                       style="width:160px;" th:value="${currentBalance}" placeholder="0.00"/>
            </div>
            <button class="btn btn-primary">Projeter</button>
        </form>
        <div sec:authorize="hasRole('VIEWER')" class="text-muted" style="font-size:.9rem;">
            (Accès lecture seule)
        </div>
    </div>

    <!-- Summary cards -->
    <div class="grid-3">
        <div class="card">
            <div class="card-title">Solde actuel</div>
            <div th:class="${'summary-amount' + (currentBalance.signum() < 0 ? ' amount-negative' : '')}"
                 th:text="${#numbers.formatDecimal(currentBalance, 1, 2) + ' €'}"></div>
        </div>
        <div class="card">
            <div class="card-title">Dépenses restantes ce mois</div>
            <div class="summary-amount amount-negative"
                 th:text="${#numbers.formatDecimal(totalMonthExpenses, 1, 2) + ' €'}">
            </div>
        </div>
        <div class="card">
            <div class="card-title">Solde fin de mois (estimé)</div>
            <div th:class="${'summary-amount' + (endOfMonthBalance.signum() < 0 ? ' amount-negative' : '')}"
                 th:text="${#numbers.formatDecimal(endOfMonthBalance, 1, 2) + ' €'}">
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card">
        <div class="card-title">Évolution du solde</div>
        <div class="chart-container">
            <canvas id="budgetChart"></canvas>
        </div>
    </div>

    <!-- Recurring expenses table -->
    <div class="card">
        <div class="flex" style="justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <div class="card-title" style="margin:0;">Dépenses récurrentes du mois</div>
            <a sec:authorize="hasAnyRole('ADMIN','EDITOR')"
               th:href="@{/budget/expenses/new}" class="btn btn-primary btn-sm">+ Nouvelle dépense</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Icône</th>
                    <th>Catégorie</th>
                    <th>Libellé</th>
                    <th>Jour</th>
                    <th class="text-right">Montant</th>
                    <th sec:authorize="hasAnyRole('ADMIN','EDITOR')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(expenses)}">
                    <td colspan="6" style="text-align:center;" class="text-muted">Aucune dépense configurée.</td>
                </tr>
                <tr th:each="exp : ${expenses}">
                    <td>
                        <span class="icon-preview"
                              th:text="${exp.category != null ? exp.category.icon : ''}"></span>
                    </td>
                    <td th:text="${exp.category != null ? exp.category.name : '-'}"></td>
                    <td th:text="${exp.label}"></td>
                    <td th:text="${exp.dayOfMonth}"></td>
                    <td class="text-right" style="font-weight:600; color:var(--danger);"
                        th:text="${#numbers.formatDecimal(exp.amount, 1, 2) + ' €'}"></td>
                    <td sec:authorize="hasAnyRole('ADMIN','EDITOR')">
                        <a th:href="@{/budget/expenses/{id}/edit(id=${exp.id})}"
                           class="btn btn-outline btn-sm">✏️ Modifier</a>
                        <form th:action="@{/budget/expenses/{id}/delete(id=${exp.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('Supprimer cette dépense ?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-danger btn-sm">🗑️</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</th:block>

<th:block th:fragment="scripts">
<script th:inline="javascript">
/*<![CDATA[*/
const projectionData = /*[[${projection}]]*/ {};
const labels = Object.keys(projectionData);
const values = Object.values(projectionData);

new Chart(document.getElementById('budgetChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Solde (€)',
            data: values,
            fill: true,
            backgroundColor: 'rgba(79,110,247,0.08)',
            borderColor: '#4f6ef7',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: values.map(v => v < 0 ? '#e74c3c' : '#4f6ef7'),
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: ctx => ctx.parsed.y.toFixed(2) + ' €'
                }
            }
        },
        scales: {
            y: {
                min: Math.min(0, ...values),
                ticks: { callback: v => v.toFixed(2) + ' €' },
                grid: { color: 'rgba(0,0,0,.05)' }
            },
            x: { grid: { display: false } }
        }
    }
});
/*]]>*/
</script>
</th:block>

</html>
