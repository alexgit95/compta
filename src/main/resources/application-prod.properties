# PostgreSQL configuration (production - ARM64 Raspberry Pi)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/budget}
spring.datasource.username=${DB_USERNAME:budget}
spring.datasource.password=${DB_PASSWORD:budget}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA: validate mode (Flyway handles migrations)
spring.jpa.hibernate.ddl-auto=validate

# Flyway configuration for database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# WebAuthn production: remplacer par le domaine réel (ex: budget.mondomaine.com)
# Remarque: WebAuthn requiert HTTPS en production (sauf localhost)
# Variables d'environnement à configurer dans Portainer: WEBAUTHN_RP_ID, WEBAUTHN_ALLOWED_ORIGINS
app.webauthn.rp-id=${WEBAUTHN_RP_ID:localhost}
app.webauthn.allowed-origins=${WEBAUTHN_ALLOWED_ORIGINS:http://localhost:8080}
